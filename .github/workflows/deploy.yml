name: Deploy to GitHub Pages

on:
  push:
    branches: [ master, main ]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
    
    - name: Install pnpm
      uses: pnpm/action-setup@v2
      with:
        version: 10.15.1
    
    - name: Install dependencies
      run: pnpm install --no-frozen-lockfile
    
    - name: Build
      run: pnpm build
    
    - name: Deploy to GitHub Pages
      run: |
        # Remove old build files but keep source files
        find . -maxdepth 1 -type f \( -name '*.html' -o -name '*.js' -o -name '*.css' \) -delete
        rm -rf assets __manus__
        
        # Copy new build files to root
        cp dist/index.html .
        cp -r dist/assets .
        cp -r dist/__manus__ . 2>/dev/null || true
        
        # Commit and push
        git config --global user.email "github-actions@github.com"
        git config --global user.name "GitHub Actions"
        git add index.html assets/ __manus__/ 2>/dev/null || true
        git commit -m "Deploy: Update build files" || true
        git push origin master
